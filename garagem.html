<!DOCTYPE html>
<html lang="pt">
<head>
<link rel="stylesheet" href="style.css"> <!-- Ligação ao CSS-->
<meta charset="UTF-8">
<title> Sistema de Gestão de Parque de Estacionamento</title> <!-- Titulo que aparece na  pagina web-->
<link rel="icon" href="garage.png" type="image/png"> <!-- Icone da pagina web-->
</head>
<body>
    <nav>
    <div class="Informacao_Adicional">
        <a href="historico.html" id="Historico">Histórico</a> <!-- Link para a pagina do Historico-->
        <a href="local.html" id="Loc">Localização</a> <!-- Link para a pagina do Localização-->
        <a href="sobre.html" id="Sobre">Sobre</a> <!-- Link para a pagina do Sobre-->
    </div>
    </nav>
    <div class="PaginaPrincipal">
        <h1>🚗 Sistema Parque de Estacionamento</h1>
        <form onsubmit="Send_Form(event)">
            <div class="Grupo_Elementos">
            <label>Matricula do Veiculo: </label>
            <input type="text" id="Matricula" placeholder="Ex: AA-00-BB">
        </div>
        <div class="Grupo_Elementos">
            <label>Tarifa por Hora(€):</label>
            <input type="number" id="Tarifa" value="1">
        </div>
        <button  type="submit" id="btn">Registar Entrada</button>
        </form>
        <div class="Informacoes">
            Total de Vagas: <span id="TotalVagas">20</span> |
            Disponiveis: <span id="VagasDisponiveis">20</span> <!-- Usa-se span para cobrir apenas o numero das vagas disponiveis-->
        </div>
    <table id="Tabela">
        <tr>
            <th> <!-- heading da tabela-->
                Matricula
            </th>
            <th>
                Lugar <!-- heading da tabela-->
            </th>
            <th> <!-- heading da tabela-->
                Entrada
            </th>
            <th>
                Ação <!-- heading da tabela-->
            </th>
        </tr>
    </table>
    </div>

<!-- Lugares De Estacionamento -->
    <div class="estacionamento">
    <div class="vaga">1</div>
    <div class="vaga">2</div>
    <div class="vaga">3</div>
    <div class="vaga">4</div>
    <div class="vaga">5</div>

    <div class="vaga">6</div>
    <div class="vaga">7</div>
    <div class="vaga">8</div>
    <div class="vaga">9</div>
    <div class="vaga">10</div>

    <div class="vaga">11</div>
    <div class="vaga">12</div>
    <div class="vaga">13</div>
    <div class="vaga">14</div>
    <div class="vaga">15</div>

    <div class="vaga">16</div>
    <div class="vaga">17</div>
    <div class="vaga">18</div>
    <div class="vaga">19</div>
    <div class="vaga">20</div>
</div>
<script src="script.js"></script> <!-- Ligação ao javascript-->
</body>
</html>
